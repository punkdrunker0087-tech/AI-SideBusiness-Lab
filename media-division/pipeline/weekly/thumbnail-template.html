<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 720px; overflow: hidden; background: #0b0e14; }
  body { font-family: "Noto Sans CJK JP", "Noto Sans JP", sans-serif; color: #f2f4f8; position: relative; }
  .bg { position: absolute; inset: 0; background: #0b0e14; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; filter: blur(70px); }
  .blob1 { width: 700px; height: 600px; left: -150px; top: -120px;
    background: radial-gradient(ellipse closest-side, rgba(88,101,242,.35), transparent 70%); }
  .blob2 { width: 650px; height: 700px; right: -180px; bottom: -160px;
    background: radial-gradient(ellipse closest-side, rgba(0,194,168,.26), transparent 70%); }
  .grain { position: absolute; inset: 0; opacity: .4;
    background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px); background-size: 20px 20px; }
  .content { position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: center; padding: 0 90px; }
  .week { font-size: 30px; letter-spacing: .3em; color: #8b93a7; margin-bottom: 28px; }
  .headline { font-size: 68px; font-weight: 900; line-height: 1.3; max-width: 950px; }
  .headline .accent { color: #4cc9b0; }
  .headline .warn { color: #ffd166; }
  .stats { display: flex; gap: 50px; margin-top: 46px; }
  .stat .num { font-size: 52px; font-weight: 900; color: #4cc9b0; }
  .stat .label { font-size: 24px; color: #8b93a7; margin-top: 4px; }
  .brand { position: absolute; bottom: 40px; right: 54px; font-size: 26px;
    letter-spacing: .25em; color: #6b7280; }
</style>
</head>
<body>
  <div class="bg"><div class="blob blob1"></div><div class="blob blob2"></div></div>
  <div class="grain"></div>
  <div class="content" id="content"></div>
  <div class="brand">LIMIT LAB</div>
<script>
  // node script が window.THUMB を注入する
  // 形式: { week: "WEEK 1", headline: "<accent>タグ可</accent>のHTML", stats: [{num, label}, ...] }
  document.addEventListener('DOMContentLoaded', () => {
    const t = window.THUMB;
    if (!t) { document.body.innerHTML = '<p style="color:red">THUMB未注入</p>'; return; }
    let html = `<div class="week">${t.week}</div><div class="headline">${t.headline}</div>`;
    if (t.stats && t.stats.length) {
      html += '<div class="stats">' + t.stats.map(s =>
        `<div class="stat"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`
      ).join('') + '</div>';
    }
    document.getElementById('content').innerHTML = html;
  });
</script>
</body>
</html>
